<app-edit-page [title]="isEditMode ? 'Edit System Feature' : 'New System Feature'" backRoute="/app-features">

    <form [formGroup]="featureForm" (ngSubmit)="onSubmit()" class="form-container">

        <div class="row">
            <div class="col-md-6 mb-3">
                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Feature Label (UI Display Name)</mat-label>
                    <input matInput formControlName="label" placeholder="e.g., Pricelists" required>
                    <mat-error *ngIf="featureForm.get('label')?.hasError('required')">Label is required</mat-error>
                </mat-form-field>
            </div>

            <div class="col-md-6 mb-3">
                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Feature Key (Permission ID)</mat-label>
                    <input matInput formControlName="key" placeholder="e.g., pricelists" required>
                    <mat-error *ngIf="featureForm.get('key')?.hasError('required')">Key is required</mat-error>
                    <mat-hint *ngIf="!isEditMode">Use lowercase, no spaces. Cannot be changed later.</mat-hint>
                </mat-form-field>
            </div>
        </div>

        <div class="row">
            <div class="col-12 mb-3">
                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Description</mat-label>
                    <textarea matInput formControlName="description" rows="3"
                        placeholder="Brief description of what this feature controls..."></textarea>
                </mat-form-field>
            </div>
        </div>

        <div class="row align-items-center">
            <div class="col-md-6 mb-3">
                <mat-form-field appearance="outline" class="w-100 mb-0">
                    <mat-label>Sort Order</mat-label>
                    <input matInput type="number" formControlName="order" placeholder="0" required>
                    <mat-error *ngIf="featureForm.get('order')?.hasError('required')">Order is required</mat-error>
                </mat-form-field>
            </div>

            <div class="col-md-6 mb-3 d-flex align-items-center">
                <mat-slide-toggle formControlName="isActive" color="primary">
                    Feature is Active
                </mat-slide-toggle>
            </div>
        </div>

        <div class="form-actions d-flex justify-content-end gap-2 mt-4">
            <button mat-button type="button" routerLink="/app-features">Cancel</button>
            <button mat-flat-button color="primary" type="submit" [disabled]="featureForm.invalid">
                {{ isEditMode ? 'Update Feature' : 'Create Feature' }}
            </button>
        </div>

    </form>

</app-edit-page>
