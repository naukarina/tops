<app-edit-page [title]="isEditMode ? 'Edit Feature' : 'New System Feature'" backRoute="/app-features">

    <form [formGroup]="featureForm" (ngSubmit)="onSubmit()" class="d-flex flex-column gap-3 mt-3">

        <mat-form-field appearance="outline">
            <mat-label>Feature Label (UI Display Name)</mat-label>
            <input matInput formControlName="label" placeholder="e.g., Pricelists" required>
            <mat-error *ngIf="featureForm.get('label')?.hasError('required')">Label is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Feature Key (Permission ID)</mat-label>
            <input matInput formControlName="key" placeholder="e.g., pricelists" required>
            <mat-error *ngIf="featureForm.get('key')?.hasError('required')">Key is required</mat-error>
            <mat-hint>Used internally in code. Use lowercase, no spaces (e.g., 'sales-orders').</mat-hint>
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Description</mat-label>
            <textarea matInput formControlName="description" rows="3" placeholder="Brief description..."></textarea>
        </mat-form-field>

        <div class="d-flex gap-4 align-items-center">
            <mat-form-field appearance="outline" class="flex-grow-1 mb-0">
                <mat-label>Sort Order</mat-label>
                <input matInput type="number" formControlName="order" placeholder="0">
            </mat-form-field>

            <mat-slide-toggle formControlName="isActive" color="primary">
                Active
            </mat-slide-toggle>
        </div>

        <div class="d-flex justify-content-end gap-2 mt-4">
            <button mat-button type="button" routerLink="/app-features">Cancel</button>
            <button mat-flat-button color="primary" type="submit" [disabled]="featureForm.invalid">
                {{ isEditMode ? 'Update Feature' : 'Create Feature' }}
            </button>
        </div>

    </form>
</app-edit-page>
