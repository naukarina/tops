<app-list-page>

    <app-data-table featureName="users" [dataInput]="users$" [columnDefinitions]="columnDefs"
        [displayedColumnsInput]="columnsForTable" [enableSelection]="true" [enableFilter]="true" [enableSort]="true"
        [enablePaginator]="true" [pageSizeOptions]="[10, 25, 50]" filterPlaceholder="Search users..."
        [editRoute]="userEditRoute" [enableDelete]="true" (deleteAction)="deleteUser($event)" title="Users"
        newRoute="/users/new" newButtonText="Add New User">
    </app-data-table>

</app-list-page>
